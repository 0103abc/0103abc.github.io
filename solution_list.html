<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>题解 - 0103abc</title>

  <link rel="stylesheet" href="style.css">

  <!-- 你的公共导航栏 / 页脚 / 主题切换 -->
  <script defer src="common.js"></script>

  <!-- 题解数据 -->
  <script defer src="solution_data.js"></script>
</head>

<body>
  <main class="container">
    <section class="content fade-in solution-page">

      <div class="solution-page-header">
        <div>
          <span class="badge">Solutions</span>
          <h1>题解</h1>
          <p class="solution-page-desc">
            这里整理了一些算法题题解、思路记录和代码实现。
          </p>
        </div>
      </div>

      <div class="solution-toolbar">
        <input
          id="solutionSearch"
          class="solution-search"
          type="search"
          placeholder="搜索题目、标签、OJ、难度……"
          autocomplete="off"
        >

        <select id="solutionOjFilter" class="solution-select">
          <option value="all">全部 OJ</option>
        </select>
      </div>

      <div class="solution-info" id="solutionInfo"></div>

      <div class="solution-list" id="solutionList"></div>

      <div class="pagination" id="pagination"></div>

    </section>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const PAGE_SIZE = 20;

      const solutionList = document.querySelector("#solutionList");
      const pagination = document.querySelector("#pagination");
      const solutionInfo = document.querySelector("#solutionInfo");
      const searchInput = document.querySelector("#solutionSearch");
      const ojFilter = document.querySelector("#solutionOjFilter");

      const allSolutions = Array.isArray(window.SOLUTION_ITEMS)
        ? [...window.SOLUTION_ITEMS]
        : [];

      // 按日期从新到旧排序
      allSolutions.sort((a, b) => {
        return new Date(b.date || "1970-01-01") - new Date(a.date || "1970-01-01");
      });

      const params = new URLSearchParams(location.search);

      let currentPage = Number(params.get("page")) || 1;
      let currentKeyword = params.get("q") || "";
      let currentOj = params.get("oj") || "all";

      searchInput.value = currentKeyword;

      initOjFilter();
      render();

      searchInput.addEventListener("input", () => {
        currentKeyword = searchInput.value.trim();
        currentPage = 1;
        updateUrl();
        render();
      });

      ojFilter.addEventListener("change", () => {
        currentOj = ojFilter.value;
        currentPage = 1;
        updateUrl();
        render();
      });

      function initOjFilter() {
        const ojSet = new Set();

        allSolutions.forEach((item) => {
          if (item.oj) {
            ojSet.add(item.oj);
          }
        });

        [...ojSet].sort().forEach((oj) => {
          const option = document.createElement("option");
          option.value = oj;
          option.textContent = oj;
          ojFilter.appendChild(option);
        });

        ojFilter.value = currentOj;
      }

      function getFilteredSolutions() {
        const keyword = currentKeyword.toLowerCase();

        return allSolutions.filter((item) => {
          const text = [
            item.title,
            item.href,
            item.date,
            item.oj,
            item.difficulty,
            item.summary,
            ...(item.tags || [])
          ]
            .join(" ")
            .toLowerCase();

          const matchKeyword = !keyword || text.includes(keyword);
          const matchOj = currentOj === "all" || item.oj === currentOj;

          return matchKeyword && matchOj;
        });
      }

      function render() {
        const filtered = getFilteredSolutions();

        const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));

        if (currentPage < 1) currentPage = 1;
        if (currentPage > totalPages) currentPage = totalPages;

        const startIndex = (currentPage - 1) * PAGE_SIZE;
        const pageItems = filtered.slice(startIndex, startIndex + PAGE_SIZE);

        renderInfo(filtered.length, totalPages);
        renderList(pageItems);
        renderPagination(totalPages);
      }

      function renderInfo(total, totalPages) {
        if (total === 0) {
          solutionInfo.textContent = "没有找到符合条件的题解。";
          return;
        }

        solutionInfo.textContent =
          `共 ${total} 篇题解，每页 ${PAGE_SIZE} 篇，当前第 ${currentPage} / ${totalPages} 页。`;
      }

      function renderList(items) {
        if (items.length === 0) {
          solutionList.innerHTML = `
            <div class="empty-card">
              暂时没有题解。可以先去喝口水，或者马上写一篇。
            </div>
          `;
          return;
        }

        solutionList.innerHTML = items
          .map((item) => {
            const tags = Array.isArray(item.tags) ? item.tags : [];

            return `
              <article class="solution-item">
                <div class="solution-main">
                  <a class="solution-title" href="${escapeAttr(item.href || "#")}">
                    ${escapeHtml(item.title || "未命名题解")}
                  </a>

                  <div class="solution-meta">
                    ${item.date ? `<span>${escapeHtml(item.date)}</span>` : ""}
                    ${item.oj ? `<span>${escapeHtml(item.oj)}</span>` : ""}
                    ${item.difficulty ? `<span>${escapeHtml(item.difficulty)}</span>` : ""}
                  </div>

                  ${
                    item.summary
                      ? `<p class="solution-summary">${escapeHtml(item.summary)}</p>`
                      : ""
                  }

                  ${
                    tags.length
                      ? `
                        <div class="solution-tags">
                          ${tags
                            .map((tag) => `<span>${escapeHtml(tag)}</span>`)
                            .join("")}
                        </div>
                      `
                      : ""
                  }
                </div>

                <a class="solution-read-btn" href="${escapeAttr(item.href || "#")}">
                  阅读
                </a>
              </article>
            `;
          })
          .join("");
      }

      function renderPagination(totalPages) {
        if (totalPages <= 1) {
          pagination.innerHTML = "";
          return;
        }

        const pages = getPageNumbers(currentPage, totalPages);

        pagination.innerHTML = `
          <button ${currentPage === 1 ? "disabled" : ""} data-page="${currentPage - 1}">
            上一页
          </button>

          ${pages
            .map((page) => {
              if (page === "...") {
                return `<span class="page-ellipsis">...</span>`;
              }

              return `
                <button
                  class="${page === currentPage ? "active" : ""}"
                  data-page="${page}"
                >
                  ${page}
                </button>
              `;
            })
            .join("")}

          <button ${currentPage === totalPages ? "disabled" : ""} data-page="${currentPage + 1}">
            下一页
          </button>
        `;

        pagination.querySelectorAll("button[data-page]").forEach((button) => {
          button.addEventListener("click", () => {
            const page = Number(button.dataset.page);

            if (!Number.isNaN(page)) {
              currentPage = page;
              updateUrl();
              render();

              document.querySelector(".solution-page").scrollIntoView({
                behavior: "smooth",
                block: "start"
              });
            }
          });
        });
      }

      function getPageNumbers(current, total) {
        if (total <= 7) {
          return Array.from({ length: total }, (_, index) => index + 1);
        }

        if (current <= 4) {
          return [1, 2, 3, 4, 5, "...", total];
        }

        if (current >= total - 3) {
          return [1, "...", total - 4, total - 3, total - 2, total - 1, total];
        }

        return [1, "...", current - 1, current, current + 1, "...", total];
      }

      function updateUrl() {
        const newParams = new URLSearchParams();

        if (currentPage > 1) {
          newParams.set("page", currentPage);
        }

        if (currentKeyword) {
          newParams.set("q", currentKeyword);
        }

        if (currentOj !== "all") {
          newParams.set("oj", currentOj);
        }

        const query = newParams.toString();
        const newUrl = query
          ? `${location.pathname}?${query}`
          : location.pathname;

        history.replaceState(null, "", newUrl);
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function escapeAttr(value) {
        return escapeHtml(value).replaceAll("`", "&#096;");
      }
    });
  </script>
</body>
</html>
